          format: uuid
          nullable: true
        attendance_date:
          type: string
          format: date
          nullable: true
        reason:
          type: string
        status:
          type: string
          enum:
          - open
          - upheld
          - rejected
        resolution:
          type: string
          nullable: true
        resolved_by:
          type: string
          format: uuid
          nullable: true
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
          example: '2026-06-06T08:00:00Z'
    CreateDisputeRequest:
      type: object
      required:
      - reason
      additionalProperties: false
      description: Must reference either an exception_id or an attendance_date.
      properties:
        exception_id:
          type: string
          format: uuid
        attendance_date:
          type: string
          format: date
        reason:
          type: string
          minLength: 3
          maxLength: 1000
          example: I was on site but the geofence flagged me as absent.
    ResolveDisputeRequest:
      type: object
      required:
      - status
      - resolution
      additionalProperties: false
      properties:
        status:
          type: string
          enum:
          - upheld
          - rejected
        resolution:
          type: string
          minLength: 3
          maxLength: 1000
          example: Upheld; CCTV confirms presence. Attendance corrected.
    LeaveType:
      type: object
      required:
      - code
      - name
      properties:
        code:
          type: string
          enum:
          - annual
          - sick
          - family_responsibility
          - maternity
          - parental
          - unpaid
          example: annual
        name:
          type: string
          example: Annual leave
        statutory_days_per_cycle:
          type: number
          format: double
          nullable: true
          description: BCEA Chapter 3 entitlement where applicable.
          example: 21
        paid:
          type: boolean
    LeaveBalance:
      type: object
      required:
      - worker_id
      - leave_type
      properties:
        worker_id:
          type: string
          format: uuid
        leave_type:
          type: string
          example: annual
        accrued_days:
          type: number
          format: double
          example: 18.5
        taken_days:
          type: number
          format: double
          example: 4
        available_days:
          type: number
          format: double
          example: 14.5
        cycle_start:
          type: string
          format: date
          nullable: true
    LeaveRequest:
      type: object
      required:
      - id
      - worker_id
      - leave_type
      - start_date
      - end_date
      - status
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        worker_id:
          type: string
          format: uuid
        leave_type:
          type: string
          example: sick
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        days:
          type: number
          format: double
          readOnly: true
          example: 2
        reason:
          type: string
          nullable: true
        status:
          type: string
          enum:
          - pending
          - approved
          - rejected
          - cancelled
        decided_by:
          type: string
          format: uuid
          nullable: true
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
          example: '2026-06-06T08:00:00Z'
    CreateLeaveRequest:
      type: object
      required:
      - leave_type
      - start_date
      - end_date
      additionalProperties: false
      properties:
        worker_id:
          type: string
          format: uuid
          description: Admin-only; defaults to the authenticated worker when omitted.
        leave_type:
          type: string
          example: annual
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        reason:
          type: string
          maxLength: 500
    UpdateLeaveStatusRequest:
      type: object
      required:
      - status
      additionalProperties: false
      properties:
        status:
          type: string
          enum:
          - approved
          - rejected
          - cancelled
        note:
          type: string
          maxLength: 500
    NotificationPreferences:
      type: object
      additionalProperties: false
      description: POPIA-compliant channel opt-ins. All default to false until the worker opts in.
      properties:
        push_enabled:
          type: boolean
          default: false
        sms_enabled:
          type: boolean
          default: false
        email_enabled:
          type: boolean
          default: false
        shift_reminders:
          type: boolean
          default: false
        dispute_updates:
          type: boolean
          default: false
        leave_updates:
          type: boolean
          default: false
        updated_at:
          type: string
          format: date-time
          readOnly: true
    PushTokenRequest:
      type: object
      required:
      - provider
      - token
      additionalProperties: false
      properties:
        provider:
          type: string
          enum:
          - fcm
          - apns
          - huawei
          - web_push
        token:
          type: string
          maxLength: 4096
          description: Provider push token. Treated as sensitive; never logged.
    Notification:
      type: object
      required:
      - id
      - type
      - created_at
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        type:
          type: string
          example: dispute_resolved
        title:
          type: string
        body:
          type: string
        read:
          type: boolean
          default: false
        created_at:
          type: string
          format: date-time
          readOnly: true
          example: '2026-06-06T08:00:00Z'
    DataExportRequest:
      type: object
      required:
      - worker_id
      additionalProperties: false
      properties:
        worker_id:
          type: string
          format: uuid
          description: Data subject whose data is exported.
        format:
          type: string
          enum:
          - json
          - csv
          default: json
        include_biometrics:
          type: boolean
          default: false
          description: Whether to include biometric templates/metadata in the export.
    ConsentRevocationRequest:
      type: object
      required:
      - worker_id
      additionalProperties: false
      properties:
        worker_id:
          type: string
          format: uuid
        reason:
          type: string
          maxLength: 500
    ConsentRevocationResponse:
      type: object
      properties:
        worker_id:
          type: string
          format: uuid
        biometric_consent:
          type: boolean
          example: false
        nfr_enabled:
          type: boolean
          example: false
        revoked_at:
          type: string
          format: date-time
          readOnly: true
