        '429':
          $ref: '#/components/responses/RateLimited'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
  /auth/worker/request-pin-reset:
    post:
      operationId: PostAuthWorkerRequestPinReset
      summary: Request worker PIN reset (sends SMS OTP)
      description: Triggers an SMS OTP to the worker's registered E.164 phone for PIN recovery. Always
        returns 202 to avoid leaking which numbers are enrolled.
      tags:
      - Auth
