      - $ref: '#/components/parameters/TenantHeader'
      - $ref: '#/components/parameters/IdempotencyKey'
  /compliance/data-export:
    post:
      operationId: PostComplianceDataExport
      summary: Trigger a POPIA/PAIA data subject export
      description: Queues a full data subject export (POPIA/PAIA). Returns an async Job; the export is
        delivered via the report download flow when ready.
      tags:
      - Compliance & DSR
      security:
      - bearerAuth: []
      responses:
        '202':
          description: Export queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/Unprocessable'
        '429':
          $ref: '#/components/responses/RateLimited'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
      parameters:
      - $ref: '#/components/parameters/TenantHeader'
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DataExportRequest'
  /compliance/consent-revocation:
    post:
      operationId: PostComplianceConsentRevocation
      summary: Revoke biometric consent (disables NFR)
      description: Revokes a worker's biometric processing consent under POPIA. Disables native face
        recognition (NFR) for that worker; subsequent clocking falls back to non-biometric evidence.
      tags:
      - Compliance & DSR
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Consent revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsentRevocationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/Unprocessable'
        '429':
          $ref: '#/components/responses/RateLimited'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
      parameters:
      - $ref: '#/components/parameters/TenantHeader'
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConsentRevocationRequest'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    sessionToken:
      type: apiKey
      in: header
      name: X-Session-Token
    refreshCookie:
      type: apiKey
      in: cookie
      name: refresh_token
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    tenantKey:
      type: apiKey
      in: header
      name: X-Tenant-Key
      description: Per-tenant API key, returned ONCE when the tenant is created. Scopes the login call
        to a tenant. This is NOT the JWT signing secret — that never leaves the server. This key only
        identifies + authorises the tenant context.
    platformKey:
      type: apiKey
      in: header
      name: X-Platform-Key
      description: Kloka-internal platform credential. Required to create tenants.
  parameters:
    TenantHeader:
      name: X-Tenant-ID
      in: header
      required: false
      description: DEPRECATED transitional header. Tenant identity will come from the JWT tenant_id claim
        once auth middleware lands; this header is the interim placeholder and must not be relied upon
        in production.
      schema:
        type: string
        format: uuid
      deprecated: true
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: UUIDv4. Makes mutating requests safe to retry / offline-replay. Accepted on all mutating
        operations for a uniform client contract; on naturally-idempotent operations (DELETE, login) the
        key is accepted but inert.
      schema:
        type: string
    Cursor:
      name: cursor
      in: query
      required: false
      description: Opaque base64 cursor from a previous response.
      schema:
        type: string
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 50
        maximum: 200
  responses:
    BadRequest:
      description: RFC 7807 problem
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Unauthorized:
      description: RFC 7807 problem
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    RateLimited:
      description: Too many requests
      headers:
        Retry-After:
          schema:
            type: integer
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    NotFound:
      description: Resource not found
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Conflict:
      description: Conflict (unique constraint or idempotency-key reuse with different payload)
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Unprocessable:
      description: Business-rule violation
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    UnsupportedMediaType:
      description: Content-Type not supported (expected application/json)
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
  schemas:
    E164Phone:
      type: string
      pattern: ^\+27[6-8]\d{8}$
      minLength: 12
      maxLength: 12
      example: '+27821234567'
      description: South African mobile number in E.164 format. Always +27 followed by a mobile prefix
        (6, 7, or 8) and 8 further digits — 12 characters total. Local 0-prefixed numbers (e.g. 0821234567)
        must be normalised to +27 before submission.
    Pin:
      type: string
      pattern: ^\d{4,8}$
      writeOnly: true
      example: '1234'
      description: 4-8 digit numeric PIN. Security derives from device binding and rate limiting, not
        PIN entropy. Write-only; never returned.
    OneTimeCode:
      type: string
      pattern: ^\d{6}$
      example: '123456'
      description: Six-digit one-time code.
    DeviceId:
      type: string
      format: uuid
      description: Identifier of a registered device.
    OpaqueToken:
      type: string
      minLength: 16
      maxLength: 4096
      description: Opaque server-issued token. Treated as bearer material; never logged.
    Problem:
      type: object
      required:
      - type
      - title
      - status
      properties:
        type:
          type: string
          format: uri
          example: https://api.kloka.co.za/errors/validation
        title:
          type: string
          example: Validation failed
        status:
          type: integer
          example: 400
        detail:
          type: string
          example: phone must be a valid South African mobile number (+27[6-8]xxxxxxxx)
        instance:
          type: string
          example: /api/v1/auth/worker/login
        request_id:
          type: string
          example: req_01HXYZ...
        errors:
          type: array
          description: Per-field validation errors (present on 400 validation failures).
          items:
            type: object
            required:
            - field
            - message
            properties:
              field:
                type: string
                example: pin
              message:
                type: string
                example: must be 4-8 digits
    ClockingEventRequest:
      type: object
      required:
      - worker_id
      - site_id
      - event_type
      - lat
      - lon
      description: All presence-evidence fields are TRUST INPUTS, scored by the trust engine — not gates.
      properties:
        worker_id:
          type: string
          format: uuid
        site_id:
          type: string
          format: uuid
        event_type:
          type: string
          enum:
          - clock_in
          - clock_out
          - break_start
          - break_end
        lat:
          type: number
          format: double
          description: GPS latitude. Geofence checked via PostGIS; outside → flagged + lower score, NOT
            rejected.
        lon:
          type: number
          format: double
        accuracy:
          type: number
          format: double
          description: GPS accuracy in metres; very low accuracy lowers trust.
        qr_payload:
          type: string
          maxLength: 2048
          description: Signed single-use QR (KLOKA|base64|HMAC). Freshness is a score input; a forged
            signature hard-rejects.
        device_id:
          $ref: '#/components/schemas/DeviceId'
        evidence:
          $ref: '#/components/schemas/ClockingEvidence'
      additionalProperties: false
    ClockingEvidence:
      type: object
      additionalProperties: false
      description: Structured presence evidence. All fields are TRUST INPUTS scored by the trust engine,
        not gates (except a forged QR signature, which hard-rejects upstream).
      properties:
        nfr:
          type: object
          additionalProperties: false
          description: Native face recognition result.
          properties:
            photo_url:
              type: string
              format: uri
              description: Stored capture for async face match.
            match_score:
              type: number
              format: double
              minimum: 0
              maximum: 1
              description: Face match confidence; populated async.
            liveness_passed:
              type: boolean
              description: Liveness check verdict.
        rcid:
          type: object
          additionalProperties: false
          description: Registered client / device identity.
          properties:
            registered:
              type: boolean
              description: Whether the presenting device is a registered RCID.
            device_fingerprint:
              type: string
              maxLength: 512
            integrity_verdict:
              type: string
              enum:
              - pass
              - warn
              - fail
        qr:
          type: object
          additionalProperties: false
          description: QR proof-of-presence freshness metadata. The signed payload itself is on the parent
            request's qr_payload.
          properties:
            challenge_id:
              type: string
            issued_at:
              type: string
              format: date-time
            age_seconds:
              type: integer
        device_fingerprint:
          type: string
          maxLength: 512
          description: Raw device fingerprint at clock time.
    WorkerLoginRequest:
      type: object
      required:
      - phone
      - pin
      additionalProperties: false
      properties:
        phone:
          $ref: '#/components/schemas/E164Phone'
        pin:
          $ref: '#/components/schemas/Pin'
        device_id:
          $ref: '#/components/schemas/DeviceId'
    AdminLoginRequest:
      type: object
      required:
      - email
      - password
      additionalProperties: false
      properties:
        email:
          type: string
          format: email
          maxLength: 254
        password:
          type: string
          format: password
          minLength: 8
          maxLength: 200
    TokenPair:
      type: object
      required:
      - access_token
      - token_type
      - expires_in
      properties:
        access_token:
          type: string
          description: User JWT (signed with the tenant secret). Sent as Bearer on all endpoints.
        token_type:
          type: string
          enum:
          - Bearer
          example: Bearer
        expires_in:
          type: integer
          example: 900
          description: Access token lifetime (seconds).
        user:
          $ref: '#/components/schemas/UserIdentity'
      description: User JWT pair. The refresh token is delivered ONLY via an HttpOnly Secure cookie (Set-Cookie),
        never in this body, to prevent XSS theft.
    MFAChallenge:
      type: object
      required:
      - mfa_required
      - session_token
      - expires_in
      properties:
        mfa_required:
          type: boolean
          example: true
        session_token:
          type: string
          description: Limited challenge token. Only completes MFA; not a full access token.
        expires_in:
          type: integer
          example: 300
        methods:
          type: array
          items:
            type: string
            enum:
            - totp
            - sms
    ClockingEventResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          example: accepted
        trust_score:
          type: number
          format: double
          example: 0.85
        trust_flags:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
          description: Authoritative server timestamp.
    CreateTenantRequest:
      type: object
      required:
      - name
      additionalProperties: false
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 120
          example: Acme Retail Group
        billing_email:
          type: string
          format: email
          example: ops@acme.co.za
        country_code:
          type: string
          pattern: ^[A-Z]{2}$
          example: ZA
          description: ISO 3166-1 alpha-2.
    CreateTenantResponse:
      type: object
      required:
      - tenant_id
      - name
      - tenant_key
      - created_at
      properties:
        tenant_id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
        tenant_key:
          type: string
          example: tk_live_8f3a...
          description: Shown ONCE. Store securely; sent as X-Tenant-Key on login. Cannot be retrieved
            again — only rotated.
        created_at:
          type: string
          format: date-time
    TenantResponse:
      type: object
      required:
      - tenant_id
      - name
      - created_at
      properties:
        tenant_id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
        country_code:
          type: string
          example: ZA
        status:
          type: string
          enum:
          - active
          - suspended
          - archived
        created_at:
          type: string
          format: date-time
    UserIdentity:
      type: object
      required:
      - user_id
      - tenant_id
      - role
      properties:
        user_id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
          readOnly: true
        role:
          type: string
          enum:
          - worker
          - admin
          - supervisor
        display_name:
          type: string
    MFAVerifyRequest:
      type: object
      required:
      - session_token
      - otp
      additionalProperties: false
      properties:
        session_token:
          $ref: '#/components/schemas/OpaqueToken'
        otp:
          $ref: '#/components/schemas/OneTimeCode'
    PageMeta:
      type: object
      required:
      - next_cursor
      properties:
        next_cursor:
          type: string
          nullable: true
          description: Opaque cursor for the next page; null at end.
          example: eyJpZCI6IjQ1NiJ9
        limit:
          type: integer
          example: 50
    Site:
      type: object
      required:
      - id
      - tenant_id
      - name
      - created_at
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        tenant_id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          minLength: 2
          maxLength: 120
          example: Sandton Branch
        center_lat:
          type: number
          format: double
          example: -26.1076
        center_lon:
          type: number
          format: double
          example: 28.0567
        geofence:
          type: object
          description: GeoJSON Polygon (WGS84).
          additionalProperties: true
        qr_required:
          type: boolean
          default: false
        status:
          type: string
          enum:
          - active
          - archived
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
          example: '2026-06-06T08:00:00Z'
        updated_at:
          type: string
          format: date-time
          readOnly: true
          example: '2026-06-06T08:00:00Z'
    CreateSiteRequest:
      type: object
      required:
      - name
      - center_lat
      - center_lon
      - geofence
      additionalProperties: false
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 120
          example: Sandton Branch
        center_lat:
          type: number
          format: double
          minimum: -90
          maximum: 90
          example: -26.1076
        center_lon:
          type: number
          format: double
          minimum: -180
          maximum: 180
          example: 28.0567
        geofence:
          type: object
          description: GeoJSON Polygon (WGS84).
          additionalProperties: true
        qr_required:
          type: boolean
          default: false
    UpdateSiteRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 120
        geofence:
          type: object
          additionalProperties: true
        qr_required:
          type: boolean
    Worker:
      type: object
      required:
      - id
      - tenant_id
      - employee_number
      - full_name
      - status
      - created_at
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        tenant_id:
          type: string
          format: uuid
          readOnly: true
        employee_number:
          type: string
          example: EMP-00123
        full_name:
          type: string
          example: Thabo Nkosi
        phone:
          $ref: '#/components/schemas/E164Phone'
        site_id:
          type: string
          format: uuid
          nullable: true
        trust_score:
          type: number
          format: double
          readOnly: true
          minimum: 0
          maximum: 1
          example: 0.92
        status:
          type: string
          enum:
          - active
          - suspended
          - offboarded
          example: active
        date_of_birth:
          type: string
          format: date
          description: Required for BCEA night-work / young-worker rules.
          example: '1992-04-17'
        biometric_consent:
          type: boolean
          description: POPIA consent to biometric (NFR) processing. False disables face recognition.
          example: true
        consent_timestamp:
          type: string
          format: date-time
          nullable: true
          description: When biometric consent was captured (POPIA audit).
          example: '2026-06-06T08:00:00Z'
        created_at:
          type: string
          format: date-time
          readOnly: true
          example: '2026-06-06T08:00:00Z'
        updated_at:
          type: string
          format: date-time
          readOnly: true
          example: '2026-06-06T08:00:00Z'
    CreateWorkerRequest:
      type: object
      required:
      - employee_number
      - full_name
      - phone
      - date_of_birth
      - biometric_consent
      - consent_timestamp
      additionalProperties: false
      properties:
        employee_number:
          type: string
          minLength: 1
          maxLength: 40
          example: EMP-00123
        full_name:
          type: string
          minLength: 2
          maxLength: 160
          example: Thabo Nkosi
        phone:
          $ref: '#/components/schemas/E164Phone'
        site_id:
          type: string
          format: uuid
        pin:
          $ref: '#/components/schemas/Pin'
        date_of_birth:
          type: string
          format: date
          description: Required for BCEA night-work / young-worker rules.
          example: '1992-04-17'
        biometric_consent:
          type: boolean
          description: POPIA consent to biometric (NFR) processing.
          example: true
        consent_timestamp:
          type: string
          format: date-time
          description: When biometric consent was captured (POPIA audit).
          example: '2026-06-06T08:00:00Z'
    UpdateWorkerRequest:
      type: object
      additionalProperties: false
      properties:
        full_name:
          type: string
          minLength: 2
          maxLength: 160
        phone:
          $ref: '#/components/schemas/E164Phone'
        site_id:
          type: string
          format: uuid
