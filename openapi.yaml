  /auth/worker/login:
    post:
      operationId: PostAuthWorkerLogin
      summary: Worker login (phone + PIN) scoped by tenant key — returns user JWT
      description: Proves IDENTITY only (no QR/face/geofence — those belong to clocking). Requires the
        X-Tenant-Key header to scope the tenant. On success returns a user JWT pair; the access token
        is used as Bearer on all subsequent endpoints. The JWT is signed with the tenant's server-side
        secret and carries tenant_id + role as claims.
      tags:
      - Auth
      security:
      - tenantKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkerLoginRequest'
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Invalid credentials or tenant key
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '423':
          description: Account locked (rate limit / too many attempts)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '429':
          $ref: '#/components/responses/RateLimited'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
  /auth/admin/login:
    post:
      operationId: PostAuthAdminLogin
      summary: Admin login step 1 (email + password) scoped by tenant key — returns MFA challenge
      tags:
      - Auth
