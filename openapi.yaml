          application/json:
            schema:
              $ref: '#/components/schemas/WorkerPinResetRequest'
  /auth/worker/confirm-pin-reset:
    post:
      operationId: PostAuthWorkerConfirmPinReset
      summary: Confirm worker PIN reset with OTP
      description: Verifies the SMS OTP and sets the new PIN. PIN is hashed with bcrypt over hex(pin_salt)
        + user_salt + pin server-side.
      tags:
      - Auth
      security:
      - tenantKey: []
      responses:
        '204':
          description: PIN reset
