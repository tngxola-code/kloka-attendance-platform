      parameters:
      - $ref: '#/components/parameters/TenantHeader'
    patch:
      operationId: PatchMyNotificationPreferences
      summary: Update notification preferences
      tags:
      - Notifications
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationPreferences'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
      parameters:
      - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationPreferences'
  /me/devices/{device_id}/push-token:
    post:
      operationId: PostMyDevicePushToken
      summary: Register a push token (FCM/APNs/Huawei/Web Push)
      tags:
      - Notifications
      security:
      - bearerAuth: []
      responses:
        '204':
          description: Token bound
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
