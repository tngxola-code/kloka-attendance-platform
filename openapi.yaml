openapi: 3.0.3
info:
  title: Kloka Attendance Platform API
  version: 1.0.0
  description: Full API surface (88 paths, 109 operations) for the Kloka zero-trust workforce attendance platform.
    Generated from the locked API_DESIGN.md. Schemas are typed where the domain is built (clocking, auth)
    and generic objects where the domain is still designed; tighten per-domain as code lands.
  contact:
    name: Kloka Engineering
    email: engineering@kloka.co.za
servers:
- url: https://api.kloka.co.za/api/v1
  description: Production
- url: http://localhost:8080/api/v1
  description: Local
tags:
- name: System
  description: Infrastructure health, metrics, and specification discovery.
- name: Auth
  description: Identity verification, session management, cryptographic device binding, and native app migration.
- name: Tenants
  description: Multi-tenant provisioning and tenant-level metadata.
- name: Sites
  description: Physical location management and geofence definitions.
- name: Workers
  description: Core lifecycle, profile, and onboarding of workforce members.
- name: Worker Devices
  description: Hardware devices bound to a worker (decoupled from the worker profile).
- name: Worker Schedule
  description: Retrieving a specific worker's upcoming shift assignments.
- name: Shifts
  description: Creation and management of shift templates.
- name: Shift Patterns
  description: Recurring scheduling logic.
- name: Assignments
  description: Mapping a specific worker to a specific site and shift.
- name: Clocking
  description: The real-time Zero Trust presence engine. Accepts raw evidence and streams live data.
- name: Attendance
  description: Aggregated, read-only views of daily attendance records.
- name: Adjustments
  description: Manual, supervisor-approved corrections to attendance records.
- name: Exceptions
  description: System-flagged anomalies and their resolution workflows.
- name: Disputes
  description: Worker-initiated disputes against system exceptions or attendance records.
- name: Leave
  description: Statutory leave management (BCEA Chapter 3 compliance).
- name: Risk
  description: Catalogue of risk flags, triggered anomaly events, and custom rule creation.
- name: Trust
  description: Granular breakdown of how a specific clocking event's trust score was calculated.
- name: Payroll Reports
  description: Asynchronous generation and downloading of payroll exports.
- name: Payroll Configuration
  description: Definition of custom payroll fields and mappings to external providers.
- name: Integrations
  description: Third-party system connections and scoped API key management.
- name: Webhooks
  description: Event-driven outbound notifications, subscriptions, and delivery retries.
- name: Audit
  description: Immutable, append-only trail of administrative actions.
- name: Dashboard
  description: High-level, real-time operational statistics.
- name: Analytics
  description: Deep-dive, filterable historical data for reporting.
- name: Platform Configuration
  description: Global or tenant-level defaults for geofencing and QR rotation.
- name: PWA
  description: Client-specific optimizations, offline sync, and localized edge queries.
- name: Notifications
  description: User-facing alerts, push token registration, and POPIA-compliant preferences.
- name: Compliance & DSR
  description: Formal POPIA/PAIA data subject requests and biometric consent management.
paths:
  /health/live:
    get:
      operationId: GetHealthLive
      summary: Liveness probe
      tags:
      - System
      security: []
      responses:
