  /clocking/events:
    post:
      operationId: PostClockingEvents
      summary: Main clock in/out/break
      tags:
      - Clocking
      security:
      - bearerAuth: []
      responses:
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '201':
          description: Event recorded with trust score
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClockingEventResponse'
        '422':
          description: Categorical rejection (forged QR / unbound device at QR-required site)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
      parameters:
      - $ref: '#/components/parameters/TenantHeader'
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClockingEventRequest'
      description: 'Proves PRESENCE, not identity (the worker is already authenticated). GPS, QR, facial
        biometric and geofence are EVIDENCE attached to this event and scored by the trust engine — NOT
        pass/fail gates. Per ADR 0005: outside-geofence is recorded, flagged and scored lower (not rejected);
        QR freshness is a score input. Only categorical failures hard-reject: forged QR signature, or
        unbound device at a QR-required site. Server created_at is authoritative; device timestamp is
        evidence only.'
    get:
      operationId: GetClockingEvents
      summary: List clock events
      tags:
      - Clocking
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Paginated list
          content:
            application/json:
              schema:
                type: object
                required:
                - data
                - next_cursor
                - has_more
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ClockingEventResponse'
                  next_cursor:
                    type: string
                    nullable: true
                  limit:
                    type: integer
                    example: 50
                  has_more:
                    type: boolean
                    description: True if more pages exist (next_cursor != null).
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
      parameters:
      - $ref: '#/components/parameters/TenantHeader'
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/Limit'
